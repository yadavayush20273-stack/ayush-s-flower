<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Boss ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:#0f0c29;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
position:relative;
}

/* Cinematic background glow */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 40%, #ff416c55, transparent 40%),
radial-gradient(circle at 70% 60%, #7b2ff755, transparent 40%),
radial-gradient(circle at 50% 80%, #00c6ff44, transparent 40%);
animation:bgMove 15s infinite alternate linear;
z-index:0;
}

@keyframes bgMove{
0%{transform:translate(-10%,-10%);}
100%{transform:translate(-30%,-30%);}
}

.container{
position:relative;
z-index:2;
}

button{
padding:10px 22px;
font-size:16px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:white;
color:#ff416c;
}

#no{
background:transparent;
border:1px solid white;
color:white;
position:relative;
}

/* Gift Overlay */
.giftOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

/* Gift animation */
.gift{
font-size:110px;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:rotate(0);}
25%{transform:rotate(6deg);}
50%{transform:rotate(-6deg);}
75%{transform:rotate(6deg);}
100%{transform:rotate(0);}
}

/* Sweet text */
.revealText{
font-size:26px;
margin-top:20px;
opacity:0;
transform:scale(0.5);
transition:1s;
color:#ffccd5;
text-shadow:0 0 15px #ff4d6d;
}

.show{
opacity:1;
transform:scale(1.2);
}

/* Funny text */
.funnyText{
margin-top:20px;
font-size:22px;
color:#ffd166;
opacity:0;
transition:1s;
}

.showFunny{
opacity:1;
}

</style>
</head>

<body>

<div class="container">
<h1>Boss ❤️</h1>
<p>Will you stay with me forever? 💍</p>

<button id="yes">YES 💖</button>
<button id="no">NO 😜</button>
</div>

<div class="giftOverlay" id="overlay">

<div class="gift" id="gift">🎁</div>

<div class="revealText" id="sweetMsg">
You are so sweet Boss 💖
</div>

<button id="thanksBtn" style="display:none;background:white;color:#ff416c;">
Say Thanks 😌
</button>

<div class="funnyText" id="funnyMsg">
Jada hawa me mat udo Boss 😏🔥
</div>

</div>

<script>

// NO button move
let noBtn=document.getElementById("no");
noBtn.addEventListener("click",()=>{
let x=Math.random()*150-75;
let y=Math.random()*150-75;
noBtn.style.transform=`translate(${x}px,${y}px)`;
});

// YES click
document.getElementById("yes").onclick=function(){

let overlay=document.getElementById("overlay");
overlay.style.display="flex";

setTimeout(()=>{
document.getElementById("gift").innerHTML="💝";
document.getElementById("gift").style.animation="none";

document.getElementById("sweetMsg").classList.add("show");

document.getElementById("thanksBtn").style.display="inline-block";

},2000);

};

// Thanks button
document.getElementById("thanksBtn").onclick=function(){
document.getElementById("funnyMsg").classList.add("showFunny");
};

</script>

</body>
</html>
