<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Special Delivery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Fredoka:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene">
      <div class="backdrop-glow"></div>

      <section class="message-card">
        <p class="label">For Someone Special</p>
        <h1>A Cute Surprise Delivery</h1>
        <p>
          Parcel form a Good Looking Boy Ayush, To His Lovely Friend Sona.🙈😻
        </p>
      </section>

      <section class="road-zone" aria-label="Animated delivery scene">
        <div class="cloud cloud-one"></div>
        <div class="cloud cloud-two"></div>
        <div class="road"></div>

        <div id="truck" class="truck" aria-hidden="true">
          <div class="truck-cab"></div>
          <div class="truck-window"></div>
          <div class="truck-cargo"></div>
          <div class="truck-light"></div>
          <div class="wheel wheel-front"></div>
          <div class="wheel wheel-back"></div>
        </div>

        <button id="parcel" class="parcel hidden" aria-live="polite">
          <span class="parcel-ribbon-h"></span>
          <span class="parcel-ribbon-v"></span>
          <span class="parcel-text">Tap to open</span>
        </button>

        <div id="teddy" class="teddy hidden" role="img" aria-label="Cute teddy bear">
          <div class="heart heart-1"></div>
          <div class="heart heart-2"></div>
          <div class="heart heart-3"></div>
          <div class="teddy-motion">
            <span class="teddy-arm teddy-arm-right" aria-hidden="true"></span>
            <span class="teddy-arm teddy-arm-left" aria-hidden="true"></span>
            <div class="teddy-photo">
              <img class="teddy-image" src="teddy_cutout.png" alt="Cute full body teddy bear" />
            </div>
          </div>
        </div>
      </section>

      <p id="status" class="status-text">Truck is on the way...</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
